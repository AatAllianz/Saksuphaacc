<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saksuphaacc Dashboard</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css" />

  <!-- External JS -->
  <script src="script.js" defer></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <header class="sidebar-header">
      <h1>Saksuphaacc</h1>
    </header>
    <nav class="sidebar-nav">
      <button class="nav-item" data-page="dashboard" aria-label="Dashboard">
        📊 Dashboard
      </button>
      <button class="nav-item" data-page="ocr" aria-label="OCR">
        🔎 OCR
      </button>
      <button class="nav-item" data-page="stock" aria-label="Stock">
        📦 Stock
      </button>
    </nav>
    <footer class="sidebar-footer">
      <small>&copy; 2026 Saksuphaacc</small>
    </footer>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <section id="dashboard" class="page active">
      <h2>Dashboard</h2>
      <p>Welcome to your dashboard overview.</p>
    </section>

    <section id="ocr" class="page">
      <h2>OCR</h2>
      <p>Upload and process documents here.</p>
    </section>

    <section id="stock" class="page">
      <h2>Stock</h2>
      <p>Manage your inventory and stock levels.</p>
    </section>
  </main>
</body>
</html>
